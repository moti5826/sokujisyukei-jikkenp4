<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MKWorld 即時集計</title>

<style>
body{background:#111;color:white;font-family:sans-serif;text-align:center;margin:0}
h1{background:#e60012;margin:0;padding:10px}

table{border-collapse:collapse;margin:auto}
td,th{border:1px solid #555;padding:4px}

input{width:70px;padding:4px}

.rank1{background:gold;color:black}
.rank2{background:silver;color:black}
.rank3{background:#cd7f32;color:black}

.panel{
background:#222;
margin:10px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<h1>MKWorld 即時集計（操作画面）</h1>

<div class="panel">

チーム形式：
<select id="format">
<option value="2">12v12</option>
<option value="3">8v8</option>
<option value="4">6v6</option>
<option value="6">4v4</option>
<option value="8">3v3</option>
<option value="12">2v2</option>
</select>

レース数：
<select id="raceCount"></select>

<br><br>

チーム登録（名前 : ショートカット）<br>
<textarea id="teamConfig" rows="5" cols="40"
placeholder="Alpha:A&#10;Blaze:B"></textarea>

<br>
<button onclick="startTournament()">大会開始</button>
<button onclick="autoFillRemaining()">余り補完</button>
<button onclick="copyScore()">点数コピー</button>

<h3 id="remaining"></h3>

</div>

<div id="tableArea"></div>

<h2>チーム順位</h2>
<div id="scoreBoard"></div>

<script>

const POINTS=[
15,12,10,9,9,8,8,7,7,6,6,6,
5,5,5,4,4,4,3,3,3,2,2,1
];

for(let i=8;i<=32;i++){
raceCount.innerHTML+=`<option>${i}</option>`;
}

let teamMap={};
let shortcutMap={};
let totalRaces=0;

function save(){
localStorage.setItem("mk_state",JSON.stringify({
html:tableArea.innerHTML,
teams:teamConfig.value
}));
}

function load(){
const data=localStorage.getItem("mk_state");
if(!data)return;
const obj=JSON.parse(data);
tableArea.innerHTML=obj.html;
teamConfig.value=obj.teams;
}

load();

function startTournament(){

teamMap={};
shortcutMap={};

teamConfig.value.split("\n").forEach(line=>{
const [name,key]=line.split(":");
if(!name||!key)return;
shortcutMap[key.trim()]=name.trim();
});

totalRaces=Number(raceCount.value);

let html="<table><tr><th>順位</th>";

for(let r=1;r<=totalRaces;r++)
html+=`<th>R${r}</th>`;

html+="</tr>";

for(let i=1;i<=24;i++){

let cls="";
if(i==1)cls="rank1";
if(i==2)cls="rank2";
if(i==3)cls="rank3";

html+=`<tr class="${cls}"><td>${i}</td>`;

for(let r=1;r<=totalRaces;r++){
html+=`<td>
<input data-r="${r}" data-rank="${i}"
oninput="inputHandler(this)"
onkeydown="moveNext(event,this)">
</td>`;
}

html+="</tr>";
}

html+="</table>";

tableArea.innerHTML=html;
save();
}

function inputHandler(el){

let v=el.value.trim();

if(shortcutMap[v]){
el.value=shortcutMap[v];
}

updateScores();
save();
}

function moveNext(e,el){
if(e.key==="Enter"){
e.preventDefault();
const inputs=[...document.querySelectorAll("input[data-r]")];
const i=inputs.indexOf(el);
if(inputs[i+1])inputs[i+1].focus();
}
}

function updateScores(){

let scores={};
let completed=new Set();

document.querySelectorAll("input[data-r]").forEach(i=>{

const team=i.value.trim();
if(!team)return;

const r=Number(i.dataset.r);
const rank=Number(i.dataset.rank);

scores[team]=(scores[team]||0)+POINTS[rank-1];

const row=[...document.querySelectorAll(`[data-r="${r}"]`)];
if(row.every(x=>x.value.trim()!=""))
completed.add(r);
});

remaining.innerText=
"残りレース："+(totalRaces-completed.size);

const sorted=Object.entries(scores)
.sort((a,b)=>b[1]-a[1]);

let html="<table><tr><th>順位</th><th>チーム</th><th>点数</th></tr>";

sorted.forEach((t,i)=>{
let cls="";
if(i==0)cls="rank1";
if(i==1)cls="rank2";
if(i==2)cls="rank3";

html+=`<tr class="${cls}">
<td>${i+1}</td>
<td>${t[0]}</td>
<td>${t[1]}</td></tr>`;
});

html+="</table>";

scoreBoard.innerHTML=html;

localStorage.setItem("mk_obs",JSON.stringify(sorted));
}

function autoFillRemaining(){

const format=Number(formatSelect.value);
const teamSize=24/format;

let count={};

document.querySelectorAll("input[data-r]").forEach(i=>{
if(!i.value)return;
count[i.value]=(count[i.value]||0)+1;
});

const teams=Object.keys(count);
if(teams.length!=2)return;

let target=teams.find(t=>count[t]==teamSize);
let other=teams.find(t=>t!==target);

document.querySelectorAll("input[data-r]").forEach(i=>{
if(!i.value)i.value=other;
});

updateScores();
}

function copyScore(){

const data=JSON.parse(localStorage.getItem("mk_obs")||"[]");

let text="";
data.forEach(t=>{
text+=`${t[0]} ${t[1]}\n`;
});

navigator.clipboard.writeText(text);
alert("コピーしました");
}

</script>

</body>
</html>
